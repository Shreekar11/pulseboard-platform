name: cloud-auth
description: Provider-keyed OIDC federation and cloud CLI setup (AWS or GCP).

inputs:
  provider:
    description: "Target cloud: aws or gcp"
    required: true
  aws-role-arn:
    description: "AWS IAM role ARN to assume via OIDC (required when provider=aws)"
    required: false
    default: ""
  aws-region:
    description: "AWS region (required when provider=aws)"
    required: false
    default: ""
  gcp-workload-identity-provider:
    description: "GCP Workload Identity provider resource name (required when provider=gcp)"
    required: false
    default: ""
  gcp-service-account:
    description: "GCP service account email to impersonate (required when provider=gcp)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      if: inputs.provider == 'aws'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Authenticate to Google Cloud (OIDC / Workload Identity Federation)
      if: inputs.provider == 'gcp'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Set up gcloud
      if: inputs.provider == 'gcp'
      uses: google-github-actions/setup-gcloud@v2
