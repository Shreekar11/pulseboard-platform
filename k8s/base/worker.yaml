apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: pulseboard/api:latest
          command: ["python", "-m", "worker.main"]
          envFrom:
            - configMapRef:
                name: pulseboard-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pulseboard-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
