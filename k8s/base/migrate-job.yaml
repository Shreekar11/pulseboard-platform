apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  annotations:
    # Re-run on each apply; relies on alembic being idempotent (upgrade head).
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: pulseboard/api:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pulseboard-db
                  key: DATABASE_URL
