apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pulseboard
resources:
  - ../../base
images:
  - name: pulseboard/api
    newName: REGISTRY/pulseboard/api
    newTag: latest
  - name: pulseboard/frontend
    newName: REGISTRY/pulseboard/frontend
    newTag: latest
patches:
  - path: patch-ingress.yaml
  - path: patch-storage.yaml
