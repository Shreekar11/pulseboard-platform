# Full stack: frontend + backend API + worker + Postgres + Redis.
# Single Redis with separate logical DBs (0=buffer, 1=rate-limit) for local only;
# production splits these into separate instances.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseboard"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF on + noeviction so accepted (un-acked) stream events are never dropped.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./apps/backend
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
      REDIS_BUFFER_URL: redis://redis:6379/0
      REDIS_RATELIMIT_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Scale horizontally with `docker compose up -d --scale worker=N`. CONSUMER_NAME
  # is intentionally NOT set: each replica self-names via the hostname default
  # (app/config.py: Field(default_factory=socket.gethostname) -> container id), so
  # every replica is a distinct consumer in the `rollup-workers` group and Redis
  # distributes entries across them. Pinning CONSUMER_NAME here would make all
  # replicas share one consumer id and collapse the fan-out.
  worker:
    build:
      context: ./apps/backend
    command: ["python", "-m", "worker.main"]
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
      REDIS_BUFFER_URL: redis://redis:6379/0
      REDIS_RATELIMIT_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    environment:
      BACKEND_ORIGIN: http://api:8000
      # NEXT_PUBLIC_API_BASE_URL intentionally unset → relative /api (cloud-agnostic)
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
