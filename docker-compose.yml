# Local backend stack (Phase 1). Frontend is added in Phase 2.
# Single Redis with separate logical DBs (0=buffer, 1=rate-limit) for local only;
# production splits these into separate instances.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseboard"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF on + noeviction so accepted (un-acked) stream events are never dropped.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./apps/backend
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
      REDIS_BUFFER_URL: redis://redis:6379/0
      REDIS_RATELIMIT_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./apps/backend
    command: ["python", "-m", "worker.main"]
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulseboard
      REDIS_BUFFER_URL: redis://redis:6379/0
      REDIS_RATELIMIT_URL: redis://redis:6379/1
      CONSUMER_NAME: worker-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
